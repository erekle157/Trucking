<!doctype html><html lang="ka" data-theme="light"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2fa36b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="გადაზიდვა">
<title>4Truckers</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#f4f5f7; --text:#1c2333; --muted:#7a8194; --muted2:#9aa0af; --sub:#5a6172; --btn-text:#4a5163;
    --card:#fff; --shadow:rgba(0,0,0,.06); --border:#d8dbe3; --border-soft:#eef0f4; --row-line:#f2f3f6;
    --input-bg:#fafbfc; --accent:#2fa36b; --accent-dark:#268758; --chip:#eceef2; --chip-hover:#dfe2e8;
    --tab-active-bg:#1c2333; --tab-active-text:#fff; --head-bg:#fbf6ec; --pchip:#eef7f1; --pchip-neg:#fbeaea; --del:#c04a4a;
    --del-soft:#c8a2a2; --bar-bg:rgba(244,245,247,.98); --cur-head:#dff2e8; --cur-bg:#f3fbf7; color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#14161a; --text:#e6e8ec; --muted:#9aa2b0; --muted2:#6f7686; --sub:#b7bcc6; --btn-text:#c2c7d0;
    --card:#1e2128; --shadow:rgba(0,0,0,.4); --border:#333844; --border-soft:#2a2f39; --row-line:#262a32;
    --input-bg:#262a32; --accent:#35b378; --accent-dark:#2a9463; --chip:#2a2f39; --chip-hover:#343a46;
    --tab-active-bg:#e6e8ec; --tab-active-text:#14161a; --head-bg:#2b2721; --pchip:#1f3328; --pchip-neg:#3a2323; --del:#e07a7a;
    --del-soft:#8a5b5b; --bar-bg:rgba(20,22,26,.98); --cur-head:#223a2c; --cur-bg:#182420; color-scheme:dark;
  }
  * { box-sizing: border-box; }
  html,body { -webkit-text-size-adjust:100%; }
  body { margin:0; padding:12px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); max-width:820px; margin:0 auto; touch-action:manipulation; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:4px; flex-wrap:nowrap; }
  .topleft { display:flex; align-items:center; gap:6px; min-width:0; flex:1 1 auto; }
  h1 { font-size:16px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  .modesw-mini { display:flex; border:1px solid var(--border); border-radius:9px; overflow:hidden; flex:0 0 auto; }
  .freq-sw { display:flex; border:1px solid var(--border); border-radius:9px; overflow:hidden; height:38px; }
  .freq-sw button { background:var(--card); color:var(--muted); border:none; padding:0 8px; font-size:11px; font-weight:700; cursor:pointer; }
  .freq-sw button.active { background:var(--accent); color:#fff; }
  .modesw-mini button { background:var(--card); color:var(--muted); border:none; padding:5px 9px; font-size:15px; cursor:pointer; line-height:1; }
  .modesw-mini button.active { background:var(--tab-active-bg); }
  .modesw-mini button#modeOwner.active { background:#f5b833; }
  .pro-badge { display:inline-block; background:#f5b833; color:#3a2a00; font-size:9px; font-weight:800; letter-spacing:.4px; border-radius:5px; padding:1px 5px; margin-left:6px; vertical-align:middle; }
  .topright { display:flex; align-items:center; gap:6px; flex:0 0 auto; }
  .iconbtn { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:5px 9px; font-size:14px; cursor:pointer; line-height:1; }
  .langsw { display:flex; border:1px solid var(--border); border-radius:9px; overflow:hidden; }
  .langsw button { background:var(--card); color:var(--muted); border:none; padding:5px 10px; font-size:12px; font-weight:700; cursor:pointer; }
  .langsw button.active { background:var(--tab-active-bg); color:var(--tab-active-text); }
  select { width:100%; min-width:0; padding:9px 10px; border:1px solid var(--border); border-radius:9px; font-size:16px; background:var(--input-bg); color:var(--text); }
  .exp-item { display:flex; align-items:center; gap:6px; padding:6px 9px; border-bottom:1px solid var(--row-line); font-size:13px; color:var(--sub); }
  .exp-item:last-child { border-bottom:none; }
  .exp-item .exp-amt { margin-left:auto; color:var(--del); font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .owner-split-head { display:flex; gap:8px; padding:2px 9px 4px; }
  .owner-split-head .day-content-split { flex:1; display:flex; gap:6px; margin-left:34px; }
  .owner-col-head { flex:1; font-size:10px; color:var(--muted2); text-transform:uppercase; letter-spacing:.3px; }
  .day-row-owner { display:flex; gap:6px; padding:6px 9px; border-bottom:1px solid var(--row-line); align-items:flex-start; }
  .day-row-owner:last-child { border-bottom:none; }
  .day-row-owner .day-label { flex:0 0 30px; font-size:11px; color:var(--muted); padding-top:5px; }
  .day-content-split { flex:1; display:flex; gap:6px; min-width:0; }
  .day-content-col { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
  .day-content-col .exp-item { padding:5px 8px; font-size:12px; }
  .day-content-col .exp-item span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .mi-display { padding:9px 8px; border:1px solid var(--border); border-radius:9px; background:var(--input-bg); font-size:15px; font-weight:700; text-align:center; color:var(--accent); }
  .wk-catbreak { color:var(--muted2); font-size:10px; margin-top:2px; }
  .cat-row { display:flex; flex-wrap:nowrap; overflow-x:auto; gap:6px; margin-bottom:8px; -webkit-overflow-scrolling:touch; }
  .cat-chip { background:var(--chip); color:var(--btn-text); border:1px solid transparent; border-radius:20px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; flex:0 0 auto; white-space:nowrap; }
  .cat-chip.active { background:var(--accent); color:#fff; }
  .cat-chip.cat-add { border:1px dashed var(--border); color:var(--muted); font-weight:800; padding:6px 14px; }
  .cat-chip.cat-add:hover { color:var(--accent); border-color:var(--accent); }
  .cat-chip.cat-temp { cursor:default; }
  .cat-chip.cust { display:inline-flex; align-items:center; gap:5px; padding-right:6px; }
  .cat-chip.cust .cc-name { cursor:pointer; }
  .cc-del { background:none; border:none; color:inherit; opacity:.6; cursor:pointer; font-size:11px; padding:0; line-height:1; }
  .cc-del:hover { opacity:1; }
  .cat-add-input { flex:0 0 auto; width:130px; background:var(--input-bg); color:var(--text); border:1px solid var(--accent); border-radius:20px; padding:6px 12px; font-size:13px; font-weight:600; outline:none; }
  .cloud { font-size:11px; margin-bottom:12px; display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
  .gbtn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:4px 10px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; }
  .gbtn:hover { background:var(--chip-hover); }
  .signout { color:var(--muted2); cursor:pointer; text-decoration:underline; }
  .card { background:var(--card); border-radius:12px; padding:12px; box-shadow:0 1px 3px var(--shadow); margin-bottom:12px; }
  .row { display:flex; gap:8px; flex-wrap:nowrap; align-items:flex-end; }
  label { display:block; font-size:11px; color:var(--muted); margin-bottom:3px; }
  input { width:100%; min-width:0; padding:9px 10px; border:1px solid var(--border); border-radius:9px; font-size:16px; background:var(--input-bg); color:var(--text); }
  input[type=number] { -moz-appearance:textfield; appearance:textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  input:focus { outline:none; border-color:var(--accent); background:var(--card); }
  .f-price { flex:1 1 60px; } .f-date { flex:2 1 120px; }
  .date-row { display:flex; gap:6px; align-items:stretch; }
  .date-row input { flex:1; min-width:0; font-size:14px; }
  .daybtn { background:var(--chip); color:var(--btn-text); padding:0 10px; font-size:15px; font-weight:700; border:none; border-radius:9px; cursor:pointer; flex:0 0 auto; }
  .daybtn:hover { background:var(--chip-hover); }
  button.add { padding:9px 14px; border:none; border-radius:9px; font-size:15px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; flex:0 0 auto; white-space:nowrap; }
  button.add:hover { background:var(--accent-dark); }
  .settings { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-top:10px; }
  .settings input { width:34px; padding:7px 4px; text-align:center; }
  .cards { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px; }
  .stat { flex:0 0 calc((100% - 16px) / 3); background:var(--card); border-radius:11px; padding:9px 11px; box-shadow:0 1px 3px var(--shadow); }
  .stat .lbl { font-size:11px; color:var(--muted); }
  .stat .share-main { font-size:17px; font-weight:800; color:var(--accent); margin-top:2px; }
  .stat .gross-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .stat .cnt { font-size:10px; color:var(--muted2); margin-top:1px; }
  .tabs { display:flex; gap:6px; margin-bottom:9px; flex-wrap:wrap; }
  .tabs button { background:var(--chip); color:var(--btn-text); padding:6px 11px; font-size:12px; border:none; border-radius:9px; cursor:pointer; font-weight:600; }
  .tabs button.active { background:var(--tab-active-bg); color:var(--tab-active-text); }
  .empty { text-align:center; color:var(--muted2); padding:20px; }
  .reset { background:none; color:var(--muted2); font-size:11px; padding:4px; float:right; border:none; cursor:pointer; }
  .reset:hover { color:var(--del); }
  .week-nav { display:flex; justify-content:space-between; margin-bottom:9px; gap:6px; }
  .navbtn { background:var(--chip); color:var(--btn-text); padding:7px 10px; border:none; border-radius:9px; cursor:pointer; font-size:12px; font-weight:600; }
  .navbtn:hover { background:var(--chip-hover); }
  .navbtn:disabled { opacity:.4; cursor:default; }
  .week-grid { display:grid; grid-template-columns:2fr 3fr; gap:8px; }
  .week-col { border:1px solid var(--border-soft); border-radius:11px; overflow:hidden; display:flex; flex-direction:column; }
  .week-col.current { border-color:var(--accent); background:var(--cur-bg); }
  .week-col.current .week-head { background:var(--cur-head); }
  .week-head { background:var(--head-bg); padding:7px 9px; font-weight:700; font-size:12px; }
  .wk-yr { color:var(--muted2); font-weight:500; font-size:11px; }
  .wk-num { color:var(--accent); }
  .wk-range { color:var(--muted); font-weight:500; font-size:11px; }
  .week-body { padding:1px 0; flex:1 1 auto; }
  .wk-empty { color:var(--muted2); text-align:center; font-size:11px; white-space:nowrap; display:flex; align-items:center; justify-content:center; height:100%; min-height:60px; padding:0 6px; }
  .day-row { padding:6px 9px; border-bottom:1px solid var(--row-line); }
  .day-row:last-child { border-bottom:none; }
  .day-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .day-prices { display:flex; flex-direction:column; gap:5px; align-items:stretch; }
  .day-prices.row-wrap { flex-direction:row; flex-wrap:wrap; align-items:center; }
  .day-prices.row-wrap .pchip { flex:0 0 auto; }
  .day-prices.split-lr { flex-direction:row; align-items:flex-start; gap:6px; }
  .day-prices.split-lr .lr-col { flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .day-prices.split-lr .pchip { flex:0 0 auto; }
  .day-prices.split-lr .pc-txt { overflow:visible; text-overflow:clip; }
  .pchip { display:flex; align-items:center; gap:6px; background:var(--pchip); color:var(--text); border-radius:7px; padding:3px 8px; font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; }
  .pchip.pos { background:var(--pchip); color:var(--accent); }
  .pchip.neg { background:var(--pchip-neg); color:var(--del); }
  .pc-txt { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pchip button { flex:0 0 auto; background:none; border:none; color:var(--del-soft); cursor:pointer; font-size:12px; padding:0 2px; line-height:1; }
  .pchip button:hover { color:var(--del); }
  .day-sum { align-self:flex-end; font-size:10px; color:var(--muted2); font-variant-numeric:tabular-nums; }
  .week-foot { padding:7px 9px; border-top:2px solid var(--border-soft); font-size:12px; display:flex; flex-direction:column; gap:1px; }
  .week-foot .fshare { font-size:14px; color:var(--accent); font-weight:700; }
  .wk-dpm { color:var(--accent); font-size:11px; font-weight:600; }
  .wk-cnt { color:var(--muted2); font-size:10px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:8px; border-bottom:1px solid var(--border-soft); }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .grp { background:var(--head-bg); font-weight:700; }
  .rowday { color:var(--sub); }
  .share-col { color:var(--accent); font-weight:600; }
  .del { background:none; color:var(--del); padding:2px 8px; font-size:13px; border:none; cursor:pointer; }
  .udbar { position:fixed; right:14px; bottom:16px; display:flex; flex-direction:column; gap:10px; z-index:500; }
  .udbtn { width:46px; height:46px; border-radius:50%; border:1px solid var(--border); background:var(--card); color:var(--text);
    font-size:20px; cursor:pointer; box-shadow:0 2px 8px var(--shadow); display:flex; align-items:center; justify-content:center; }
  .udbtn:disabled { opacity:.35; cursor:default; }
  #kbBar { position:fixed; left:0; right:0; bottom:0; padding:7px 12px; background:var(--bar-bg);
    border-top:1px solid var(--border); display:none; z-index:9999; }
  #kbBar.show { display:block; }
  .kb-add { width:100%; padding:13px; border:none; border-radius:11px; background:var(--accent); color:#fff; font-size:16px; font-weight:700; }
  .stat-top { display:flex; align-items:flex-start; justify-content:space-between; gap:4px; }
  .stat-enter { flex:0 0 auto; background:var(--chip); color:var(--accent); border:none; border-radius:7px; width:24px; height:24px; font-size:13px; font-weight:800; cursor:pointer; line-height:1; }
  .stat-enter:hover { background:var(--accent); color:#fff; }
  .detail-page { position:fixed; inset:0; background:var(--bg); z-index:1000; overflow-y:auto; padding:14px; max-width:820px; margin:0 auto; }
  .detail-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; position:sticky; top:0; background:var(--bg); padding:4px 0; }
  .detail-back { flex:0 0 auto; background:var(--chip); color:var(--text); border:none; border-radius:9px; padding:8px 14px; font-size:15px; font-weight:700; cursor:pointer; }
  .detail-title { font-size:18px; font-weight:800; }
  .detail-summary { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .detail-sum-box { flex:1 1 100px; background:var(--card); border-radius:11px; padding:10px 12px; box-shadow:0 1px 3px var(--shadow); }
  .detail-sum-box .lbl { font-size:11px; color:var(--muted2); }
  .detail-sum-box .val { font-size:18px; font-weight:800; margin-top:2px; }
  .detail-section-title { font-size:14px; font-weight:700; margin:16px 0 6px; color:var(--muted); }
  .detail-page table { width:100%; border-collapse:collapse; }
  .detail-page th { text-align:left; font-size:11px; color:var(--muted2); font-weight:600; padding:4px 8px; }
  .detail-page th.num, .detail-page td.num { text-align:right; }
  .detail-page td { padding:8px; border-top:1px solid var(--row-line); font-size:13px; }
  .detail-empty { color:var(--muted2); font-size:13px; padding:10px; text-align:center; }
  .cat-group-row { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-start; }
  .cat-group { flex:1 1 150px; min-width:150px; margin-bottom:0; background:var(--card); border-radius:11px; overflow:hidden; }
  .cat-group-head { display:flex; justify-content:space-between; padding:9px 12px; font-weight:800; font-size:14px; background:var(--row-line); }
  .cat-group-items { display:flex; flex-direction:column; }
  .cat-group-line { display:flex; justify-content:space-between; padding:8px 12px; font-size:13px; color:var(--muted); border-top:1px solid var(--row-line); }
  .cat-group-line:first-child { border-top:none; }
</style>
</head><body>

<div class="topbar">
  <div class="topleft">
    <h1>🚚 <span id="appTitle"></span></h1>
    <div class="modesw-mini">
      <button id="modeDriver" class="active" onclick="setMode('driver')" title="">🧑‍✈️</button>
      <button id="modeOwner" onclick="setMode('owner')" title="">👑</button>
    </div>
  </div>
  <div class="topright">
    <button id="themeBtn" class="iconbtn" onclick="toggleTheme()">🌙</button>
    <div class="langsw">
      <button id="langKa" onclick="setLang('ka')">GEO</button>
      <button id="langEn" onclick="setLang('en')">ENG</button>
    </div>
  </div>
</div>
<div class="cloud" id="cloudStatus"></div>

<div class="card">
  <div class="row">
    <div class="f-price"><label id="lblPrice"></label><input id="price" type="number" inputmode="decimal" enterkeyhint="done"/></div>
    <div class="f-date"><label id="lblDate"></label>
      <div class="date-row">
        <button class="daybtn" id="dayPrev" onclick="changeDate(-1)">◀</button>
        <input id="date" type="date"/>
        <button class="daybtn" id="dayNext" onclick="changeDate(1)">▶</button>
      </div>
    </div>
    <button class="add" id="add"></button>
  </div>
  <div class="row" id="routeRow" style="margin-top:8px;">
    <div style="flex:1 1 60px;min-width:0"><label id="lblRoute"></label><input id="route" type="text"/></div>
    <div style="flex:0 0 70px"><label id="lblMiles"></label><input id="miles" type="number" inputmode="numeric"/></div>
    <button class="add" id="imgBtn" style="flex:0 0 auto;background:var(--chip);color:var(--btn-text)">📷</button>
    <input id="imgInput" type="file" accept="image/*" style="display:none"/>
  </div>
  <div class="row" id="mileageRow" style="margin-top:8px;display:none;">
    <div style="flex:0 0 56px"><label id="lblCompanyFee"></label><input id="companyFee" type="number" min="0" max="100" step="1" inputmode="numeric"/></div>
    <div style="flex:1 1 70px;min-width:0"><label id="lblStartMi"></label><input id="ownStartMi" type="number" inputmode="numeric"/></div>
    <div style="flex:1 1 70px;min-width:0"><label id="lblEndMi"></label><input id="ownEndMi" type="number" inputmode="numeric"/></div>
    <div style="flex:1 1 70px;min-width:0"><label id="lblWeekMi"></label><div id="weekMiDisplay" class="mi-display">0</div></div>
  </div>
  <div class="settings" id="shareRow"><span id="lblShare"></span> <input id="share" type="number" min="0" max="100" step="1"/> %</div>
</div>

<div class="card" id="expCard" style="display:none">
  <div class="cat-row" id="expCatRow"></div>
  <div class="row">
    <div style="flex:1 1 90px;min-width:0"><label id="lblExpAmt"></label><input id="expAmt" type="number" inputmode="decimal"/></div>
    <button class="add" id="expAdd"></button>
    <button class="daybtn" id="expCancelEdit" onclick="cancelEditExpense()" style="display:none" title="">✕</button>
  </div>
  <div class="row" style="margin-top:8px;">
    <div style="flex:2 1 150px;min-width:0"><label id="lblExpDate"></label>
      <div class="date-row">
        <button class="daybtn" onclick="changeExpDate(-1)">◀</button>
        <input id="expDate" type="date"/>
        <button class="daybtn" onclick="changeExpDate(1)">▶</button>
      </div>
    </div>
    <div style="flex:0 0 64px"><label id="lblFixedExp" style="white-space:nowrap;font-size:9.5px"></label><input id="fixedExp" type="number" inputmode="decimal"/></div>
    <div style="flex:0 0 auto"><label>&nbsp;</label>
      <div class="freq-sw">
        <button type="button" id="freqWeek" class="active" onclick="setFixedFreq('week')"></button>
        <button type="button" id="freqMonth" onclick="setFixedFreq('month')"></button>
      </div>
    </div>
  </div>
</div>

<div class="cards" id="stats"></div>

<div class="card" style="margin-top:6px;">
  <div class="tabs">
    <button id="tab-week" class="active" onclick="setView('week')"></button>
    <button id="tab-month" onclick="setView('month')"></button>
    <button id="tab-all" onclick="setView('all')"></button>
  </div>
  <div id="content"></div>
</div>

<div class="udbar">
  <button id="redoBtn" class="udbtn" onclick="redo()">↷</button>
  <button id="undoBtn" class="udbtn" onclick="undo()">↶</button>
</div>

// ---- ღრუბელი + Google login ----
let db=null, cloudUid=null, cloudEmail='', isSignedIn=false, firstSnap=true, pushTimer=null, unsub=null;

function renderAuthBar(){
  const el=document.getElementById('cloudStatus'); if(!el) return;
  if(isSignedIn){
    el.innerHTML='<span style="color:var(--accent)">'+t('syncOn')+(cloudEmail?' · '+cloudEmail:'')+'</span> <span class="signout" onclick="signOutCloud()">'+t('signOut')+'</span>';
  } else {
    el.innerHTML='<span style="color:var(--muted2)">'+t('syncOff')+'</span> <button class="gbtn" onclick="signInGoogle()">'+t('googleSync')+'</button>';
  }
}
function signInGoogle(){
  if(typeof firebase==='undefined'||!db) return;
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(err=>{
    const code=err&&err.code||'';
    if(code==='auth/popup-closed-by-user'||code==='auth/cancelled-popup-request') return;
    try{ firebase.auth().signInWithRedirect(provider); }catch(e){ console.warn(e); }
  });
}
function signOutCloud(){ if(typeof firebase!=='undefined'){ firebase.auth().signOut(); } }

function pushCloud(){
  if(!db || !cloudUid) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    db.collection('users').doc(cloudUid).set({ cars: carsDriver, carsOwner, settings, expenses, weeklyMileage, customCats, updatedAt: Date.now() })
      .catch(e=>console.warn('cloud write failed', e));
  }, 400);
}
function subscribeCloud(){
  if(!db||!cloudUid) return;
  if(unsub){ unsub(); unsub=null; }
  firstSnap=true;
  unsub=db.collection('users').doc(cloudUid).onSnapshot(snap=>{
    const d = snap.exists ? (snap.data()||{}) : null;
    if(firstSnap){
      firstSnap=false;
      if(d && ((Array.isArray(d.cars)&&d.cars.length) || (Array.isArray(d.carsOwner)&&d.carsOwner.length) || (Array.isArray(d.expenses)&&d.expenses.length))){
        if(Array.isArray(d.cars)) carsDriver=d.cars; if(Array.isArray(d.carsOwner)) carsOwner=d.carsOwner;
        if(d.settings) settings=d.settings; if(Array.isArray(d.expenses)) expenses=d.expenses;
        if(d.weeklyMileage && typeof d.weeklyMileage==='object') weeklyMileage=d.weeklyMileage;
        if(Array.isArray(d.customCats)) customCats=d.customCats;
        store.set('cars',JSON.stringify(carsDriver)); store.set('carsOwner',JSON.stringify(carsOwner));
        store.set('settings',JSON.stringify(settings)); store.set('expenses',JSON.stringify(expenses));
        store.set('weeklyMileage',JSON.stringify(weeklyMileage)); store.set('customCats',JSON.stringify(customCats));
        document.getElementById('share').value=settings.share; document.getElementById('companyFee').value=settings.companyFee||''; syncFixedExpUI(); populateCats(); if(appMode==='owner') loadMileageInputs(); render();
      } else { pushCloud(); }
    } else if(d){
      if(Array.isArray(d.cars)) carsDriver=d.cars;
      if(Array.isArray(d.carsOwner)) carsOwner=d.carsOwner;
      if(d.settings) settings=d.settings;
      if(Array.isArray(d.expenses)) expenses=d.expenses;
      if(d.weeklyMileage && typeof d.weeklyMileage==='object') weeklyMileage=d.weeklyMileage;
      if(Array.isArray(d.customCats)) customCats=d.customCats;
      store.set('cars',JSON.stringify(carsDriver)); store.set('carsOwner',JSON.stringify(carsOwner));
      store.set('settings',JSON.stringify(settings)); store.set('expenses',JSON.stringify(expenses));
      store.set('weeklyMileage',JSON.stringify(weeklyMileage)); store.set('customCats',JSON.stringify(customCats));
      document.getElementById('share').value=settings.share; document.getElementById('companyFee').value=settings.companyFee||''; syncFixedExpUI(); populateCats(); if(appMode==='owner') loadMileageInputs(); render();
    }
  }, err=>{ console.warn('snapshot error', err); });
}
function initCloud(){
  if(typeof firebase==='undefined'){ renderAuthBar(); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    firebase.auth().getRedirectResult().catch(e=>console.warn('redirect result', e));
  }catch(e){ db=null; renderAuthBar(); return; }
  firebase.auth().onAuthStateChanged(user=>{
    if(user){ cloudUid=user.uid; cloudEmail=user.email||user.displayName||''; isSignedIn=true; renderAuthBar(); subscribeCloud(); }
    else { cloudUid=null; isSignedIn=false; if(unsub){ unsub(); unsub=null; } renderAuthBar(); }
  });
}

function money(n){ return '$' + (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function moneyc(n){ return Number.isInteger(n) ? '$'+(n||0).toLocaleString('en-US') : money(n); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function routeStates(r){ if(!r) return ''; const st=r.match(/\b[A-Z]{2}\b/g); if(st&&st.length>=2) return st[0]+' → '+st[st.length-1]; return r; }
function dpmFmt(v){ return '$'+(v||0).toFixed(2); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function selDate(){ const el=document.getElementById('date'); return (el&&el.value)||todayStr(); }
function valid(s){ return s && !isNaN(new Date(s+'T00:00:00').getTime()); }
function addDays(s,n){ const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function mondayOf(s){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
const WD_KA = ['კვ','ორშ','სამ','ოთხ','ხუთ','პარ','შაბ'];
const WD_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function weekdayShort(s){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); return (lang==='ka'?WD_KA:WD_EN)[d.getDay()]; }
function fmtDay(s, compact){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); if(compact==='weekday') return weekdayShort(s); if(compact) return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); return weekdayShort(s)+', '+d.toLocaleDateString(loc(),{day:'numeric',month:'short'}); }
function dm(s, compact){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); if(compact) return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); return d.toLocaleDateString(loc(),{day:'numeric',month:'short'}); }
function monthKey(s){ return (s||'').slice(0,7); }
function fmtMonth(k){ if(!valid(k+'-01')) return k||''; return new Date(k+'-01T00:00:00').toLocaleDateString(loc(),{month:'long',year:'numeric'}); }
function shareOf(g){ return g*(settings.share/100); }

async function load(){
  try{ const r=await store.get('theme'); if(r==='dark'||r==='light') applyTheme(r);
       else applyTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light'); }catch(e){ applyTheme('light'); }
  try{ const r=await store.get('lang'); if(r==='en'||r==='ka') lang=r; }catch(e){}
  try{ const r=await store.get('cars'); if(r) carsDriver=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('carsOwner'); if(r) carsOwner=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('settings'); if(r) settings=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('expenses'); if(r) expenses=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('customCats'); if(r) customCats=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('weeklyMileage'); if(r) weeklyMileage=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('mode'); if(r==='owner'||r==='driver') appMode=r; }catch(e){}
  let changed=false;
  carsDriver = carsDriver.map(c=>{ if(!c.date){ c.date=c.deliveryDate||c.pickupDate||todayStr(); changed=true; } return c; })
             .filter(c=>valid(c.date));
  carsOwner = carsOwner.filter(c=>valid(c.date));
  applyStaticLabels();
  populateCats();
  document.getElementById('share').value=settings.share; document.getElementById('companyFee').value=settings.companyFee||'';
  document.getElementById('date').value=todayStr();
  document.getElementById('expDate').value=todayStr();
  applyMode();
  render();
  updateUndoRedo();
  if(changed) saveCarsDriver();
  initCloud();
}

let undoStack={driver:[],owner:[]}, redoStack={driver:[],owner:[]};
function updateUndoRedo(){ const u=document.getElementById('undoBtn'), r=document.getElementById('redoBtn'); if(u)u.disabled=!undoStack[appMode==='owner'?'owner':'driver'].length; if(r)r.disabled=!redoStack[appMode==='owner'?'owner':'driver'].length; }
function pushHistory(){ const k=appMode==='owner'?'owner':'driver'; undoStack[k].push(JSON.stringify(activeCars())); if(undoStack[k].length>100) undoStack[k].shift(); redoStack[k]=[]; updateUndoRedo(); }
function undo(){ const k=appMode==='owner'?'owner':'driver'; if(!undoStack[k].length) return; redoStack[k].push(JSON.stringify(activeCars())); setActiveCars(JSON.parse(undoStack[k].pop())); saveActiveCars(); render(); updateUndoRedo(); }
function redo(){ const k=appMode==='owner'?'owner':'driver'; if(!redoStack[k].length) return; undoStack[k].push(JSON.stringify(activeCars())); setActiveCars(JSON.parse(redoStack[k].pop())); saveActiveCars(); render(); updateUndoRedo(); }

function changeDate(delta){ const el=document.getElementById('date'); el.value=addDays(el.value||todayStr(),delta); syncExpDate(); if(appMode==='owner') loadMileageInputs(); render(); }
function syncExpDate(){ const dEl=document.getElementById('date'), eEl=document.getElementById('expDate'); if(dEl&&eEl&&dEl.value){ eEl.value=dEl.value; } }
function addCar(){
  const priceEl=document.getElementById('price');
  const price=parseFloat(priceEl.value);
  if(!price||price<=0){ priceEl.focus(); return; }
  const date=document.getElementById('date').value||todayStr();
  const route=document.getElementById('route').value.trim();
  const miles=parseFloat(document.getElementById('miles').value)||0;
  pushHistory();
  activeCars().push({ id:Date.now()+''+Math.random(), price, date, route, miles });
  priceEl.value=''; document.getElementById('route').value=''; document.getElementById('miles').value='';
  weekPage=0;
  saveActiveCars(); render(); priceEl.focus();
}
function delCar(id){ pushHistory(); setActiveCars(activeCars().filter(c=>c.id!==id)); saveActiveCars(); render(); }
function setView(v){ view=v; if(v==='week') weekPage=0; ['week','month','all'].forEach(tt=>document.getElementById('tab-'+tt).classList.toggle('active',tt===v)); render(); }
function navWeek(d){
  weekPage=Math.max(-8, weekPage+d);
  const dEl=document.getElementById('date');
  if(dEl && dEl.value) dEl.value=addDays(dEl.value, -7*d);
  syncExpDate();
  if(appMode==='owner') loadMileageInputs();
  render();
}
function goToday(){
  const anchor=anchorMon(), todayMon=mondayOf(todayStr());
  const wp=Math.round((new Date(anchor+'T00:00:00')-new Date(todayMon+'T00:00:00'))/(7*86400000));
  weekPage=Math.max(-8, wp);
  const dEl=document.getElementById('date'); if(dEl) dEl.value=todayStr();
  render();
}
function resetAll(){ if(confirm(t('confirmClear'))){ setActiveCars([]); saveActiveCars(); render(); } }

function renderStats(){
  const td=todayStr(), yr=td.slice(0,4), prevYr=(parseInt(yr)-1)+'';
  const wk=anchorMonFor(carsDriver), lastWk=addDays(wk,-7);
  const mk=anchorMonthFor(carsDriver), prevMk=prevMonthKey(mk);
  const filt=(fn)=>{ const arr=carsDriver.filter(fn); return {g:arr.reduce((a,c)=>a+c.price,0), n:arr.length}; };
  const data=[
    [t('thisWeek'), filt(c=>mondayOf(c.date)===wk), {k:'week',v:wk}],
    [t('lastWeek'), filt(c=>mondayOf(c.date)===lastWk), {k:'week',v:lastWk}],
    [t('thisMonth'), filt(c=>monthKey(c.date)===mk), {k:'month',v:mk}],
    [t('lastMonth'), filt(c=>monthKey(c.date)===prevMk), {k:'month',v:prevMk}],
    [(yr+' '+t('yearWord')).trim(), filt(c=>c.date.slice(0,4)===yr), {k:'year',v:yr}],
    [(prevYr+' '+t('yearWord')).trim(), filt(c=>c.date.slice(0,4)===prevYr), {k:'year',v:prevYr}],
    [t('total'), filt(()=>true), {k:'all',v:''}]
  ];
  document.getElementById('stats').innerHTML=data.map(([l,o,desc])=>`
    <div class="stat"><div class="stat-top"><div class="lbl">${l}</div><button class="stat-enter" onclick="openDetail('${desc.k}','${desc.v}','${escJS(l)}')" title="${t('openDetail')}">↵</button></div>

function anchorMonFor(arr){
  const todayMon=mondayOf(todayStr());
  if(!arr.length) return todayMon;
  const maxDate=arr.reduce((m,c)=>c.date>m?c.date:m, arr[0].date);
  const dataMon=mondayOf(maxDate);
  return dataMon>todayMon?dataMon:todayMon;
}
function anchorMon(){ return anchorMonFor(activeCars()); }
function anchorMonthFor(arr){
  const todayMk=monthKey(todayStr());
  if(!arr.length) return todayMk;
  const maxDate=arr.reduce((m,c)=>c.date>m?c.date:m, arr[0].date);
  const dataMk=monthKey(maxDate);
  return dataMk>todayMk?dataMk:todayMk;
}
function prevMonthKey(mk){
  const parts=mk.split('-'); const y=parseInt(parts[0]), m=parseInt(parts[1]);
  const d=new Date(y, m-2, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function weekNumber(mon, arr){
  arr = arr || activeCars();
  if(!arr.length || !valid(mon)) return null;
  const minDate=arr.reduce((m,c)=>c.date<m?c.date:m, arr[0].date);
  const first=mondayOf(minDate);
  const diff=Math.round((new Date(mon+'T00:00:00') - new Date(first+'T00:00:00'))/(7*86400000));
  return diff+1;
}
function weekHead(mon, arr, compact){
  const sun=addDays(mon,6);

  const wlabel=(wn&&wn>=1)?`<span class="wk-num">${t('weekWord')} ${wn}</span> · `:'';
  return `<div class="week-head">${wlabel}<span class="wk-range">${dm(mon,compact)} – ${dm(sun,compact)} ${mon.slice(0,4)}</span></div>`;
}

  const body = days.map(d=>{

let tessLoading=null;
function ensureTesseract(){
  if(typeof Tesseract!=='undefined') return Promise.resolve();
  if(tessLoading) return tessLoading;
  tessLoading=new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
  return tessLoading;
}
function parseOCR(text){
  const m=text.match(/\$\s?\d[\d,]*(?:\.\d{1,2})?/g);
  if(m&&m.length){ let best=0; m.forEach(x=>{ const v=parseFloat(x.replace(/[^0-9.]/g,'')); if(v>best) best=v; }); if(best>0) document.getElementById('price').value=best; }
  const cs=text.match(/[A-Za-z][A-Za-z .'\-]{1,22},\s*[A-Z]{2}(?![A-Za-z])/g);
  if(cs&&cs.length>=2){ document.getElementById('route').value=cs[0].trim()+' → '+cs[cs.length-1].trim(); }
  else { const ft=text.match(/from\s+(.+?)\s+to\s+([^\n]+)/i); if(ft) document.getElementById('route').value=ft[1].trim()+' → '+ft[2].trim(); }
  const mi=text.match(/(\d[\d,]{0,5})\s*mi(?:les)?\b/i);
  if(mi){ const v=parseFloat(mi[1].replace(/,/g,'')); if(v>0) document.getElementById('miles').value=v; }
  document.getElementById('price').focus();
}
async function handleImage(file){
  if(!file) return;
  const btn=document.getElementById('imgBtn'); const orig=btn.textContent; btn.textContent='⏳'; btn.disabled=true;
  try{ await ensureTesseract(); const r=await Tesseract.recognize(file,'eng'); parseOCR(r.data.text||''); }
  catch(e){ console.warn('OCR', e); alert(t('ocrFail')); }
  btn.textContent=orig; btn.disabled=false;
}

function weeksInMonth(mk){
  const first=new Date(mk+'-01T00:00:00');
  const next=new Date(first); next.setMonth(next.getMonth()+1);
  let count=0; const day=new Date(first);
  while(day<next){ if(day.getDay()===1) count++; day.setDate(day.getDate()+1); }
  return count;
}
function fixedCostFor(desc){
  const amt=parseFloat(settings.fixedExpAmt); if(isNaN(amt)||amt<=0) return 0;
  const freq=settings.fixedExpFreq||'week';
  if(desc.k==='week' && freq!=='week') return 0;
  const dates=[]; carsOwner.forEach(c=>{ if(matchPeriod(c.date, desc)) dates.push(c.date); }); expenses.forEach(e=>{ if(matchPeriod(e.date, desc)) dates.push(e.date); });
  if(!dates.length) return 0;
  if(freq==='week'){
    const weeks=new Set(dates.map(d=>mondayOf(d)));
    return amt*weeks.size;
  } else {
    const months=new Set(dates.map(d=>monthKey(d)));
    return amt*months.size;
  }
}

  const loadsTable = loads.length
    ? `<table><thead><tr><th>${t('day')}</th><th>${t('routeCol')}</th><th class="num">mi</th><th class="num">${t('priceCol')}</th></tr></thead><tbody>${
        loads.map(c=>`<tr><td>${fmtDay(c.date)}</td><td>${esc(c.route||'')}</td><td class="num">${c.miles||''}</td><td class="num" style="color:var(--accent);font-weight:700">${money(c.price)}</td></tr>`).join('')}</tbody></table>`
    : `<div class="detail-empty">${t('noEntries')}</div>`;

  let expSection='';
  if(owner){
    let expTable;
    if(exps.length){
      const byCat={}; exps.forEach(e=>{ (byCat[e.cat]=byCat[e.cat]||[]).push(e); });
      const catKeys=Object.keys(byCat).sort((a,b)=>{
        const ta=byCat[a].reduce((s,x)=>s+x.amount,0), tb=byCat[b].reduce((s,x)=>s+x.amount,0);
        return tb-ta;
      });
      const groups=catKeys.map(cat=>{
        const items=byCat[cat].sort((a,b)=>a.date<b.date?-1:1);
        const tot=items.reduce((s,x)=>s+x.amount,0);
        const lines=items.map(e=>`<div class="cat-group-line"><span>${fmtDay(e.date,'weekday')}</span><span style="color:var(--del)">−${money(e.amount)}</span></div>`).join('');
        return `<div class="cat-group">
          <div class="cat-group-head"><span>${esc(cat)}</span><span style="color:var(--del)">−${money(tot)}</span></div>
          <div class="cat-group-items">${lines}</div>
        </div>`;
      }).join('');
      expTable = `<div class="cat-group-row">${groups}</div>`;
    } else {
      expTable=`<div class="detail-empty">${t('noEntries')}</div>`;
    }
    expSection = `<div class="detail-section-title">${t('totalExp')} (${exps.length})</div>${expTable}`;
  }

  document.getElementById('detailPage').innerHTML = `
    <div class="detail-head">
      <button class="detail-back" onclick="closeDetail()">← ${t('back')}</button>
      <div class="detail-title">${esc(detailLabel)}</div>
    </div>
    ${summary}
    <div class="detail-section-title">${t('priceCol')} (${loads.length})</div>
    ${loadsTable}
    ${expSection}
  `;
}

function ownerRenderStats(){
  const td=todayStr(), yr=td.slice(0,4), prevYr=(parseInt(yr)-1)+'';
  const wk=anchorMonFor(carsOwner), lastWk=addDays(wk,-7);
  const mk=anchorMonthFor([...carsOwner, ...expenses]), prevMk=prevMonthKey(mk);
  const gsum=fn=>carsOwner.filter(fn).reduce((a,c)=>a+c.price,0);
  const esum=fn=>expenses.filter(fn).reduce((a,x)=>a+x.amount,0);
  const card=(l,fn,desc)=>{
    const gArr=carsOwner.filter(fn), eArr=expenses.filter(fn);
    const g=gArr.reduce((a,c)=>a+c.price,0), e=eArr.reduce((a,x)=>a+x.amount,0);
    const fee=companyFeeAmt(g);
    const hasInfo=gArr.length>0 || eArr.length>0;
    const fx=hasInfo?fixedCostFor(desc):0;
    return {l,g,e,fee,fx,n:g-fee-e-fx,desc};
  };
  const data=[
    card(t('thisWeek'), c=>mondayOf(c.date)===wk, {k:'week',v:wk}),
    card(t('lastWeek'), c=>mondayOf(c.date)===lastWk, {k:'week',v:lastWk}),
    card(t('thisMonth'), c=>monthKey(c.date)===mk, {k:'month',v:mk}),
    card(t('lastMonth'), c=>monthKey(c.date)===prevMk, {k:'month',v:prevMk}),
    card((yr+' '+t('yearWord')).trim(), c=>c.date.slice(0,4)===yr, {k:'year',v:yr}),
    card((prevYr+' '+t('yearWord')).trim(), c=>c.date.slice(0,4)===prevYr, {k:'year',v:prevYr}),
    card(t('total'), ()=>true, {k:'all',v:''})
  ];
  document.getElementById('stats').innerHTML=data.map(o=>`
    <div class="stat"><div class="stat-top"><div class="lbl">${o.l}</div><button class="stat-enter" onclick="openDetail('${o.desc.k}','${o.desc.v}','${escJS(o.l)}')" title="${t('openDetail')}">↵</button></div>
      <div class="share-main">${money(o.n)}</div>
      <div class="gross-sub">Gross: ${money(o.g)}</div>
      <div class="cnt">${t('totalExp')}: −${money(o.e+o.fee+o.fx)}</div>
    </div>`).join('');
}
function ownerWeekColumn(mon, collapsed){
  const loads=carsOwner.filter(c=>mondayOf(c.date)===mon).sort((a,b)=>a.date<b.date?-1:1);
  const exps=expenses.filter(e=>mondayOf(e.date)===mon).sort((a,b)=>a.date<b.date?-1:1);
  const g=loads.reduce((a,x)=>a+x.price,0);
  const wmi=weeklyMiles(mon);
  const eTotal=exps.reduce((a,x)=>a+x.amount,0);
  const fee=companyFeeAmt(g);
  const fixedAmt=(loads.length>0 || exps.length>0) ? fixedCostFor({k:'week',v:mon}) : 0;
  const net=g-fee-eTotal-fixedAmt;
  const cur=(mon===mondayOf(selDate()))?' current':'';
  let body;
  if(collapsed){
    const dateSet=new Set([...loads.map(c=>c.date), ...exps.map(e=>e.date)]);
    const cDates=Array.from(dateSet).sort();
    body = cDates.length
      ? cDates.map(d=>{
          const dl=loads.filter(c=>c.date===d), de=exps.filter(e=>e.date===d);
          const posChips=dl.map(c=>`<span class="pchip pos"><span class="pc-txt">${moneyc(c.price)}</span><button onclick="delCar('${c.id}')" title="${t('del')}">✕</button></span>`).join('');
          const negChips=de.map(e=>`<span class="pchip neg"><span class="pc-txt" onclick="editExpense('${e.id}')" style="cursor:pointer">−${moneyc(e.amount)}</span><button onclick="delExpense('${e.id}')" title="${t('del')}">✕</button></span>`).join('');
          return `<div class="day-row"><div class="day-label">${fmtDay(d,'weekday')}</div><div class="day-prices split-lr"><div class="lr-col">${posChips}</div><div class="lr-col">${negChips}</div></div></div>`;
        }).join('')
      : `<div class="wk-empty">${t('noEntries')}</div>`;
  } else {
    const byDate={};
    loads.forEach(c=>{ (byDate[c.date]=byDate[c.date]||{loads:[],exps:[]}).loads.push(c); });
    exps.forEach(e=>{ (byDate[e.date]=byDate[e.date]||{loads:[],exps:[]}).exps.push(e); });
    const dates=[0,1,2,3,4,5,6].map(i=>addDays(mon,i));
    const rows = dates.map(d=>{
      const rec=byDate[d]||{loads:[],exps:[]};
      const loadsCol = rec.loads.length
        ? rec.loads.map(c=>{
            const meta=[routeStates(c.route), (c.miles? c.miles+' mi':'')].filter(Boolean).join(' · ');
            return `<div class="exp-item"><span>${meta?esc(meta):''}</span><span class="exp-amt" style="color:var(--accent)">${moneyc(c.price)}</span><button class="del" onclick="delCar('${c.id}')">✕</button></div>`;
          }).join('')
        : '';
      const expCol = rec.exps.length
        ? rec.exps.map(e=>`<div class="exp-item"><span onclick="editExpense('${e.id}')" style="cursor:pointer">${esc(e.cat)}</span><span class="exp-amt">−${money(e.amount)}</span><button class="del" onclick="delExpense('${e.id}')">✕</button></div>`).join('')
        : '';
      return `<div class="day-row-owner">
        <div class="day-label">${fmtDay(d,'weekday')}</div>
        <div class="day-content-split">
          <div class="day-content-col">${loadsCol}</div>
          <div class="day-content-col">${expCol}</div>
        </div>
      </div>`;
    }).join('');
    body = `<div class="owner-split-head"><div class="day-content-split"><div class="owner-col-head">${t('priceCol')}</div><div class="owner-col-head">${t('totalExp')}</div></div></div>${rows}`;
  }
  const byCat={}; exps.forEach(e=>{ byCat[e.cat]=(byCat[e.cat]||0)+e.amount; });
  const catKeys=Object.keys(byCat);
  const catBreak = catKeys.length ? `<div class="wk-catbreak">${catKeys.map(k=>k+' −'+moneyc(byCat[k])).join(' · ')}</div>` : '';
  return `<div class="week-col${cur}">${weekHead(mon, carsOwner, true)}
    <div class="week-body">${body}</div>
    <div class="week-foot">
      <div>Gross: <b>${money(g)}</b>${wmi>0?` · $/m ${dpmFmt(g/wmi)}`:''}</div>
      ${fee>0?`<div>${t('companyFee')}: <b>−${money(fee)}</b></div>`:''}
      ${fixedAmt>0?`<div>${t('fixedExpLbl')}: <b>−${money(fixedAmt)}</b></div>`:''}
      <div>${t('totalExp')}: <b>−${money(eTotal)}</b></div>
      ${catBreak}
      <div class="fshare">${t('payLbl')}: ${money(net)}</div>
      ${wmi>0?`<div class="wk-dpm">${t('weekMiLbl')}: ${wmi} mi</div>`:''}
      <div class="wk-cnt">${loads.length} ${t('cars')} · ${exps.length} ${t('expTitle')}</div>
    </div>
  </div>`;
}
function ownerRenderContent(){
  const c=document.getElementById('content');
  if(view==='week'){
    const curMon=anchorMonFor(carsOwner);
    const newest=addDays(curMon,-7*weekPage);
    const older=addDays(newest,-7);
    const canNewer=weekPage>-8;
    c.innerHTML=`<div class="week-nav">
        <button class="navbtn" onclick="navWeek(1)">${t('navPrev')}</button>
        <button class="navbtn" onclick="goToday()">${t('todayBtn')}</button>
        <button class="navbtn" onclick="navWeek(-1)" ${canNewer?'':'disabled'}>${t('navNext')}</button>
      </div>
      <div class="week-grid">${ownerWeekColumn(older, true)}${ownerWeekColumn(newest, false)}</div>`;
    return;
  }
  if(view==='month'){
    const months={};
    carsOwner.forEach(x=>{ const k=monthKey(x.date); (months[k]=months[k]||{g:0,e:0}).g+=x.price; });
    expenses.forEach(x=>{ const k=monthKey(x.date); (months[k]=months[k]||{g:0,e:0}).e+=x.amount; });
    const keys=Object.keys(months).sort().reverse();
    if(!keys.length){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }
    c.innerHTML=`<table><thead><tr><th></th><th class="num">Gross</th><th class="num">${t('totalExp')}</th><th class="num">${t('net')}</th></tr></thead><tbody>${
      keys.map(k=>{ const m=months[k]; const fee=companyFeeAmt(m.g); const fx=fixedCostFor({k:'month',v:k}); return `<tr class="grp" style="cursor:pointer" onclick="openDetail('month','${k}','${escJS(fmtMonth(k))}')"><td>${fmtMonth(k)}</td><td class="num">${money(m.g)}</td><td class="num">−${money(m.e+fee+fx)}</td><td class="num share-col">${money(m.g-fee-fx-m.e)}</td></tr>`; }).join('')}</tbody></table>`;
    return;
  }
  // all -> expense list
  if(!expenses.length){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }
  const all=[...expenses].sort((a,b)=>a.date<b.date?1:-1);
  c.innerHTML=`<table><thead><tr><th>${t('day')}</th><th>${t('expCat')}</th><th class="num">${t('expAmt')}</th><th></th></tr></thead><tbody>${
    all.map(x=>`<tr style="cursor:pointer" onclick="editExpense('${x.id}')"><td class="rowday">${fmtDay(x.date)}</td><td class="rowday">${esc(x.cat)}</td><td class="num">−${money(x.amount)}</td><td class="num"><button class="del" onclick="event.stopPropagation();delExpense('${x.id}')">${t('del')}</button></td></tr>`).join('')}</tbody></table>`;
}

document.getElementById('expAdd').addEventListener('click', addExpense);
document.getElementById('expAmt').addEventListener('keydown', e=>{ if(e.key==='Enter') addExpense(); });
document.getElementById('ownStartMi').addEventListener('input', updateWeekMiDisplay);
document.getElementById('ownEndMi').addEventListener('input', updateWeekMiDisplay);
document.getElementById('ownStartMi').addEventListener('change', saveMileageInputs);
document.getElementById('ownEndMi').addEventListener('change', saveMileageInputs);
document.getElementById('fixedExp').addEventListener('change', saveFixedExp);

load();
</script>
