<style>
  * { box-sizing: border-box; }

  body { margin:0; padding:12px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f5f7; color:#1c2333; max-width:820px; margin:0 auto; }

  .stat .cnt { font-size:10px; color:#9aa0af; margin-top:1px; }
  .tabs { display:flex; gap:6px; margin-bottom:9px; flex-wrap:wrap; }
  .tabs button { background:#eceef2; color:#4a5163; padding:6px 11px; font-size:12px; border:none; border-radius:9px; cursor:pointer; font-weight:600; }
  .tabs button.active { background:#1c2333; color:#fff; }

  .navbtn:hover { background:#dfe2e8; }

  .week-col { border:1px solid #eef0f4; border-radius:11px; overflow:hidden; }

  .wk-yr { color:#9aa0af; font-weight:500; font-size:11px; }
  .week-body { padding:1px 0; }
  .wk-empty { padding:14px 9px; color:#9aa0af; text-align:center; font-size:12px; }
  .day-row { padding:6px 9px; border-bottom:1px solid #f2f3f6; }
  .day-row:last-child { border-bottom:none; }
  .day-label { font-size:11px; color:#7a8194; margin-bottom:4px; }
  .day-prices { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
  .pchip { display:inline-flex; align-items:center; gap:5px; background:#eef7f1; color:#1c2333; border-radius:7px; padding:2px 7px; font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; }
  .pchip button { background:none; border:none; color:#c8a2a2; cursor:pointer; font-size:11px; padding:0; line-height:1; }
  .pchip button:hover { color:#c04a4a; }
  .day-sum { margin-left:auto; font-size:10px; color:#9aa0af; font-variant-numeric:tabular-nums; }
  .week-foot { padding:7px 9px; border-top:2px solid #eef0f4; font-size:12px; display:flex; flex-direction:column; gap:1px; }
  .week-foot .fshare { font-size:14px; color:#2fa36b; font-weight:700; }
  .wk-cnt { color:#9aa0af; font-size:10px; }

  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .grp { background:#fbf6ec; font-weight:700; }
  .share-col { color:#2fa36b; font-weight:600; }
  .del { background:none; color:#c04a4a; padding:2px 8px; font-size:13px; border:none; cursor:pointer; }
  #kbBar { position:fixed; left:0; right:0; bottom:0; padding:7px 12px; background:rgba(244,245,247,.98);
    border-top:1px solid #e2e5ea; display:none; z-index:9999; }
  #kbBar.show { display:block; }
  .kb-add { width:100%; padding:13px; border:none; border-radius:11px; background:#2fa36b; color:#fff; font-size:16px; font-weight:700; }
</style>

const firebaseConfig = {
  apiKey: "AIzaSyB91OtMwrzPq-W9FmmBsxGsiKRHvYmlwJs",
  authDomain: "trucking-tracker-dc621.firebaseapp.com",
  projectId: "trucking-tracker-dc621",
  storageBucket: "trucking-tracker-dc621.firebasestorage.app",
  messagingSenderId: "237965493114",
  appId: "1:237965493114:web:3cdadba88d127e77ea0cc3"

// ---- ენა / language ----
let lang = 'ka';
const T = {
  ka:{ title:"გადაზიდვის ტრეკერი", price:"ფასი ($)", pricePh:"მაგ. 500", date:"თარიღი", add:"დამატება", addEnter:"დამატება ↵",
    myShare:"ჩემი წილი:", byWeek:"კვირების მიხედვით", byMonth:"თვეების მიხედვით", all:"ყველა", clearAll:"ყველაფრის წაშლა",
    prevDay:"წინა დღე", nextDay:"შემდეგი დღე", thisWeek:"ამ კვირაში", lastWeek:"წინა კვირა", thisMonth:"ამ თვეში",
    thisYear:"წელს", total:"სულ", shareSuffix:"— ჩემი წილი", cars:"მანქანა", carsShort:"მანქ.", navPrev:"◀ წინა",
    navNext:"შემდეგი ▶", noEntries:"— ჩანაწერი არ არის —", shareFoot:"ჩემი წილი:", day:"დღე", priceCol:"ფასი",
    del:"წაშლა", noneYet:"ჯერ ჩანაწერი არ არის ⬆️", confirmClear:"ნამდვილად წავშალო ყველა ჩანაწერი?",
    syncOn:"☁️ სინქდება ყველა მოწყობილობაზე", syncOff:"📴 მხოლოდ ამ მოწყობილობაზე ინახება.", googleSync:"Google-ით სინქი", signOut:"გასვლა" },
  en:{ title:"Transport Tracker", price:"Price ($)", pricePh:"e.g. 500", date:"Date", add:"Add", addEnter:"Add ↵",
    myShare:"My share:", byWeek:"By week", byMonth:"By month", all:"All", clearAll:"Clear all",
    prevDay:"Previous day", nextDay:"Next day", thisWeek:"This week", lastWeek:"Last week", thisMonth:"This month",
    thisYear:"Year", total:"Total", shareSuffix:"— my share", cars:"cars", carsShort:"cars", navPrev:"◀ Prev",
    navNext:"Next ▶", noEntries:"— no entries —", shareFoot:"My share:", day:"Day", priceCol:"Price",
    del:"Delete", noneYet:"No entries yet ⬆️", confirmClear:"Delete all entries?",
    syncOn:"☁️ Syncing across all devices", syncOff:"📴 Saved on this device only.", googleSync:"Sync with Google", signOut:"Sign out" }
};
function t(k){ return (T[lang]&&T[lang][k])||k; }
function loc(){ return lang==='en'?'en-US':'ka-GE'; }

let cars = [];
let settings = { share: 33 };
let view = 'week';
let weekPage = 0;
const hasStore = typeof window !== 'undefined' && window.storage;

const store = {
  async get(key){
    if(hasStore){ try{ const r=await window.storage.get('haul:'+key); return r?r.value:null; }catch(e){} }
    try{ return localStorage.getItem('haul:'+key); }catch(e){ return null; }
  },
  async set(key,val){
    if(hasStore){ try{ await window.storage.set('haul:'+key,val); return; }catch(e){} }
    try{ localStorage.setItem('haul:'+key,val); }catch(e){}
  }
};

// ---- ღრუბელი + Google login ----
let db=null, cloudUid=null, cloudEmail='', isSignedIn=false, firstSnap=true, pushTimer=null, unsub=null;

function renderAuthBar(){
  const el=document.getElementById('cloudStatus'); if(!el) return;
  if(isSignedIn){
    el.innerHTML='<span style="color:#2fa36b">'+t('syncOn')+(cloudEmail?' · '+cloudEmail:'')+'</span> <span class="signout" onclick="signOutCloud()">'+t('signOut')+'</span>';
  } else {
    el.innerHTML='<span style="color:#9aa0af">'+t('syncOff')+'</span> <button class="gbtn" onclick="signInGoogle()">'+t('googleSync')+'</button>';
  }
}
function signInGoogle(){
  if(typeof firebase==='undefined'||!db) return;
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(err=>{
    const code=err&&err.code||'';
    if(code==='auth/popup-closed-by-user'||code==='auth/cancelled-popup-request') return;
    try{ firebase.auth().signInWithRedirect(provider); }catch(e){ console.warn(e); }
  });
}
function signOutCloud(){ if(typeof firebase!=='undefined'){ firebase.auth().signOut(); } }

function pushCloud(){
  if(!db || !cloudUid) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    db.collection('users').doc(cloudUid).set({ cars, settings, updatedAt: Date.now() })
      .catch(e=>console.warn('cloud write failed', e));
  }, 400);
}
function subscribeCloud(){
  if(!db||!cloudUid) return;
  if(unsub){ unsub(); unsub=null; }
  firstSnap=true;
  unsub=db.collection('users').doc(cloudUid).onSnapshot(snap=>{
    const d = snap.exists ? (snap.data()||{}) : null;
    if(firstSnap){
      firstSnap=false;
      if(d && Array.isArray(d.cars) && d.cars.length){
        cars=d.cars; if(d.settings) settings=d.settings;
        store.set('cars',JSON.stringify(cars)); store.set('settings',JSON.stringify(settings));
        document.getElementById('share').value=settings.share; render();
      } else { pushCloud(); }
    } else if(d){
      if(Array.isArray(d.cars)) cars=d.cars;
      if(d.settings) settings=d.settings;
      store.set('cars',JSON.stringify(cars)); store.set('settings',JSON.stringify(settings));
      document.getElementById('share').value=settings.share; render();
    }
  }, err=>{ console.warn('snapshot error', err); });
}
function initCloud(){
  if(typeof firebase==='undefined'){ renderAuthBar(); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    firebase.auth().getRedirectResult().catch(e=>console.warn('redirect result', e));
  }catch(e){ db=null; renderAuthBar(); return; }
  firebase.auth().onAuthStateChanged(user=>{
    if(user){ cloudUid=user.uid; cloudEmail=user.email||user.displayName||''; isSignedIn=true; renderAuthBar(); subscribeCloud(); }
    else { cloudUid=null; isSignedIn=false; if(unsub){ unsub(); unsub=null; } renderAuthBar(); }
  });
}

function money(n){ return '$' + (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function valid(s){ return s && !isNaN(new Date(s+'T00:00:00').getTime()); }
function addDays(s,n){ const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function mondayOf(s){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
function fmtDay(s){ if(!valid(s)) return s||''; return new Date(s+'T00:00:00').toLocaleDateString(loc(),{weekday:'short',day:'numeric',month:'short'}); }
function dm(s){ if(!valid(s)) return s||''; return new Date(s+'T00:00:00').toLocaleDateString(loc(),{day:'numeric',month:'short'}); }
function monthKey(s){ return (s||'').slice(0,7); }
function fmtMonth(k){ if(!valid(k+'-01')) return k||''; return new Date(k+'-01T00:00:00').toLocaleDateString(loc(),{month:'long',year:'numeric'}); }
function shareOf(g){ return g*(settings.share/100); }

function applyStaticLabels(){
  document.documentElement.lang = lang;
  document.getElementById('appTitle').textContent = t('title');
  document.getElementById('lblPrice').textContent = t('price');
  document.getElementById('price').placeholder = t('pricePh');
  document.getElementById('lblDate').textContent = t('date');
  document.getElementById('dayPrev').title = t('prevDay');
  document.getElementById('dayNext').title = t('nextDay');
  document.getElementById('add').textContent = t('add');
  document.getElementById('lblShare').textContent = t('myShare');
  document.getElementById('tab-week').textContent = t('byWeek');
  document.getElementById('tab-month').textContent = t('byMonth');
  document.getElementById('tab-all').textContent = t('all');
  document.getElementById('resetBtn').textContent = t('clearAll');
  document.getElementById('kbAdd').textContent = t('addEnter');
  document.getElementById('langKa').classList.toggle('active', lang==='ka');
  document.getElementById('langEn').classList.toggle('active', lang==='en');
}
function setLang(l){
  lang=l; store.set('lang', l);
  applyStaticLabels(); renderAuthBar(); render();
}

async function load(){
  try{ const r=await store.get('lang'); if(r==='en'||r==='ka') lang=r; }catch(e){}
  try{ const r=await store.get('cars'); if(r) cars=JSON.parse(r); }catch(e){}
  try{ const r=await store.get('settings'); if(r) settings=JSON.parse(r); }catch(e){}
  let changed=false;
  cars = cars.map(c=>{ if(!c.date){ c.date=c.deliveryDate||c.pickupDate||todayStr(); changed=true; } return c; })
             .filter(c=>valid(c.date));
  applyStaticLabels();
  document.getElementById('share').value=settings.share;
  document.getElementById('date').value=todayStr();
  render();
  if(changed) saveCars();
  initCloud();
}
async function saveCars(){ await store.set('cars',JSON.stringify(cars)); pushCloud(); }
async function saveSettings(){ await store.set('settings',JSON.stringify(settings)); pushCloud(); }

function changeDate(delta){ const el=document.getElementById('date'); el.value=addDays(el.value||todayStr(),delta); }
function addCar(){
  const priceEl=document.getElementById('price');
  const price=parseFloat(priceEl.value);
  if(!price||price<=0){ priceEl.focus(); return; }
  const date=document.getElementById('date').value||todayStr();
  cars.push({ id:Date.now()+''+Math.random(), price, date });
  priceEl.value='';
  weekPage=0;
  saveCars(); render(); priceEl.focus();
}
function delCar(id){ cars=cars.filter(c=>c.id!==id); saveCars(); render(); }
function setView(v){ view=v; if(v==='week') weekPage=0; ['week','month','all'].forEach(tt=>document.getElementById('tab-'+tt).classList.toggle('active',tt===v)); render(); }
function navWeek(d){ weekPage=Math.max(0, weekPage+d); render(); }
function resetAll(){ if(confirm(t('confirmClear'))){ cars=[]; saveCars(); render(); } }

function renderStats(){
  const td=todayStr(), wk=mondayOf(td), lastWk=addDays(wk,-7), mk=monthKey(td), yr=td.slice(0,4);
  const filt=(fn)=>{ const arr=cars.filter(fn); return {g:arr.reduce((a,c)=>a+c.price,0), n:arr.length}; };
  const data=[
    [t('thisWeek'), filt(c=>mondayOf(c.date)===wk)],
    [t('lastWeek'), filt(c=>mondayOf(c.date)===lastWk)],
    [t('thisMonth'), filt(c=>monthKey(c.date)===mk)],
    [t('thisYear')+' '+yr, filt(c=>c.date.slice(0,4)===yr)],
    [t('total'), filt(()=>true)]
  ];
  document.getElementById('stats').innerHTML=data.map(([l,o])=>`
    <div class="stat"><div class="lbl">${l} ${t('shareSuffix')}</div>
      <div class="share-main">${money(shareOf(o.g))}</div>
      <div class="gross-sub">Gross: ${money(o.g)}</div>
      <div class="cnt">${o.n} ${t('cars')}</div>
    </div>`).join('');
}

function anchorMon(){
  const todayMon=mondayOf(todayStr());
  if(!cars.length) return todayMon;
  const maxDate=cars.reduce((m,c)=>c.date>m?c.date:m, cars[0].date);
  const dataMon=mondayOf(maxDate);
  return dataMon>todayMon?dataMon:todayMon;
}
function weekColumn(mon){
  const list=cars.filter(c=>mondayOf(c.date)===mon);
  const g=list.reduce((a,x)=>a+x.price,0);
  const sun=addDays(mon,6);
  const byDay={}; list.forEach(c=>{ (byDay[c.date]=byDay[c.date]||[]).push(c); });
  const days=Object.keys(byDay).sort();
  const body = days.length
    ? days.map(d=>{
        const items=byDay[d];
        const dsum=items.reduce((a,x)=>a+x.price,0);
        const chips=items.map(c=>`<span class="pchip">${money(c.price)}<button onclick="delCar('${c.id}')" title="${t('del')}">✕</button></span>`).join('');
        const sum = items.length>1 ? `<span class="day-sum">= ${money(dsum)}</span>` : '';
        return `<div class="day-row"><div class="day-label">${fmtDay(d)}</div><div class="day-prices">${chips}${sum}</div></div>`;
      }).join('')
    : `<div class="wk-empty">${t('noEntries')}</div>`;
  return `<div class="week-col">
    <div class="week-head">${dm(mon)} – ${dm(sun)} <span class="wk-yr">${mon.slice(0,4)}</span></div>
    <div class="week-body">${body}</div>
    <div class="week-foot">
      <div>Gross: <b>${money(g)}</b></div>
      <div class="fshare">${t('shareFoot')} ${money(shareOf(g))}</div>
      <div class="wk-cnt">${list.length} ${t('cars')}</div>
    </div>
  </div>`;
}
function renderWeekView(){
  const curMon=anchorMon();
  const newest=addDays(curMon,-7*weekPage);
  const older=addDays(newest,-7);
  const canNewer=weekPage>0;
  return `<div class="week-nav">
      <button class="navbtn" onclick="navWeek(2)">${t('navPrev')}</button>
      <button class="navbtn" onclick="navWeek(-2)" ${canNewer?'':'disabled'}>${t('navNext')}</button>
    </div>
    <div class="week-grid">${weekColumn(older)}${weekColumn(newest)}</div>`;
}

function renderContent(){
  const c=document.getElementById('content');
  if(view==='week'){ c.innerHTML=renderWeekView(); return; }
  if(cars.length===0){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }
  if(view==='all'){
    const all=[...cars].sort((a,b)=>a.date<b.date?1:-1);
    c.innerHTML=`<table><thead><tr><th>${t('day')}</th><th class="num">${t('priceCol')}</th><th></th></tr></thead><tbody>${
      all.map(x=>`<tr><td style="color:#5a6172">${fmtDay(x.date)}</td><td class="num">${money(x.price)}</td><td class="num"><button class="del" onclick="delCar('${x.id}')">${t('del')}</button></td></tr>`).join('')}</tbody></table>`;
    return;
  }
  const groups={}; cars.forEach(x=>{ const k=monthKey(x.date); (groups[k]=groups[k]||[]).push(x); });
  const keys=Object.keys(groups).sort().reverse();
  let html=`<table><thead><tr><th></th><th class="num">Gross</th><th class="num">${t('shareFoot').replace(':','')}</th></tr></thead><tbody>`;
  keys.forEach(k=>{
    const list=groups[k].sort((a,b)=>a.date<b.date?-1:1);
    const g=list.reduce((a,x)=>a+x.price,0);
    html+=`<tr class="grp"><td>${fmtMonth(k)} · ${list.length} ${t('carsShort')}</td><td class="num">${money(g)}</td><td class="num share-col">${money(shareOf(g))}</td></tr>`;
    list.forEach(x=>{ html+=`<tr><td style="padding-left:22px;color:#5a6172">${fmtDay(x.date)}</td><td class="num">${money(x.price)}</td><td class="num"><button class="del" onclick="delCar('${x.id}')">${t('del')}</button></td></tr>`; });
  });
  html+=`</tbody></table>`; c.innerHTML=html;
}
function render(){ renderStats(); renderContent(); }

document.getElementById('add').addEventListener('click', addCar);
document.getElementById('price').addEventListener('keydown', e=>{ if(e.key==='Enter') addCar(); });
document.getElementById('share').addEventListener('input', e=>{ const v=parseFloat(e.target.value); if(!isNaN(v)){ settings.share=v; saveSettings(); render(); } });

(function(){
  const kbBar=document.getElementById('kbBar');
  const priceEl=document.getElementById('price');
  function positionBar(){ const vv=window.visualViewport; if(!vv) return; const gap=Math.max(0, window.innerHeight-(vv.height+vv.offsetTop)); kbBar.style.transform='translateY(-'+gap+'px)'; }
  priceEl.addEventListener('focus', ()=>{ kbBar.classList.add('show'); setTimeout(positionBar,50); });
  priceEl.addEventListener('blur', ()=>{ setTimeout(()=>kbBar.classList.remove('show'),150); });
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', positionBar); window.visualViewport.addEventListener('scroll', positionBar); }
  document.getElementById('kbAdd').addEventListener('pointerdown', e=>{ e.preventDefault(); addCar(); setTimeout(positionBar,50); });
})();

load();
</script>
</body></html>
