let db=null, cloudUid=null, cloudEmail='', isSignedIn=false, firstSnap=true, pushTimer=null, unsub=null;

function renderAuthBar(){
  const el=document.getElementById('cloudStatus'); if(!el) return;
  if(isSignedIn){
    el.innerHTML='<span style="color:var(--accent)">'+t('syncOn')+(cloudEmail?' · '+cloudEmail:'')+'</span> <span class="signout" onclick="signOutCloud()">'+t('signOut')+'</span>';
  } else {
    el.innerHTML='<span style="color:var(--muted2)">'+t('syncOff')+'</span> <button class="gbtn" onclick="signInGoogle()">'+t('googleSync')+'</button>';
  }
}
function signInGoogle(){
  if(typeof firebase==='undefined'||!db) return;
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(err=>{
    const code=err&&err.code||'';
    if(code==='auth/popup-closed-by-user'||code==='auth/cancelled-popup-request') return;
    try{ firebase.auth().signInWithRedirect(provider); }catch(e){ console.warn(e); }
  });
}
function signOutCloud(){ if(typeof firebase!=='undefined'){ firebase.auth().signOut(); } }

function pushCloud(){
  if(!db || !cloudUid) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    db.collection('users').doc(cloudUid).set({ cars: carsDriver, carsOwner, settings, expenses, weeklyMileage, updatedAt: Date.now() })
      .catch(e=>console.warn('cloud write failed', e));
  }, 400);
}
function subscribeCloud(){
  if(!db||!cloudUid) return;
  if(unsub){ unsub(); unsub=null; }
  firstSnap=true;
  unsub=db.collection('users').doc(cloudUid).onSnapshot(snap=>{
    const d = snap.exists ? (snap.data()||{}) : null;
    if(firstSnap){
      firstSnap=false;
      if(d && ((Array.isArray(d.cars)&&d.cars.length) || (Array.isArray(d.carsOwner)&&d.carsOwner.length) || (Array.isArray(d.expenses)&&d.expenses.length))){
        if(Array.isArray(d.cars)) carsDriver=d.cars; if(Array.isArray(d.carsOwner)) carsOwner=d.carsOwner;
        if(d.settings) settings=d.settings; if(Array.isArray(d.expenses)) expenses=d.expenses;
        if(d.weeklyMileage && typeof d.weeklyMileage==='object') weeklyMileage=d.weeklyMileage;
        store.set('cars',JSON.stringify(carsDriver)); store.set('carsOwner',JSON.stringify(carsOwner));
        store.set('settings',JSON.stringify(settings)); store.set('expenses',JSON.stringify(expenses));
        store.set('weeklyMileage',JSON.stringify(weeklyMileage));
        document.getElementById('share').value=settings.share; if(appMode==='owner') loadMileageInputs(); render();
      } else { pushCloud(); }
    } else if(d){
      if(Array.isArray(d.cars)) carsDriver=d.cars;
      if(Array.isArray(d.carsOwner)) carsOwner=d.carsOwner;
      if(d.settings) settings=d.settings;
      if(Array.isArray(d.expenses)) expenses=d.expenses;
      if(d.weeklyMileage && typeof d.weeklyMileage==='object') weeklyMileage=d.weeklyMileage;
      store.set('cars',JSON.stringify(carsDriver)); store.set('carsOwner',JSON.stringify(carsOwner));
      store.set('settings',JSON.stringify(settings)); store.set('expenses',JSON.stringify(expenses));
      store.set('weeklyMileage',JSON.stringify(weeklyMileage));
      document.getElementById('share').value=settings.share; if(appMode==='owner') loadMileageInputs(); render();
    }
  }, err=>{ console.warn('snapshot error', err); });
}
function initCloud(){
  if(typeof firebase==='undefined'){ renderAuthBar(); return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    firebase.auth().getRedirectResult().catch(e=>console.warn('redirect result', e));
  }catch(e){ db=null; renderAuthBar(); return; }
  firebase.auth().onAuthStateChanged(user=>{
    if(user){ cloudUid=user.uid; cloudEmail=user.email||user.displayName||''; isSignedIn=true; renderAuthBar(); subscribeCloud(); }
    else { cloudUid=null; isSignedIn=false; if(unsub){ unsub(); unsub=null; } renderAuthBar(); }
  });
}

function money(n){ return '$' + (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function moneyc(n){ return Number.isInteger(n) ? '$'+(n||0).toLocaleString('en-US') : money(n); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function routeStates(r){ if(!r) return ''; const st=r.match(/\b[A-Z]{2}\b/g); if(st&&st.length>=2) return st[0]+' → '+st[st.length-1]; return r; }
function dpmFmt(v){ return '$'+(v||0).toFixed(2); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function selDate(){ const el=document.getElementById('date'); return (el&&el.value)||todayStr(); }
function valid(s){ return s && !isNaN(new Date(s+'T00:00:00').getTime()); }
function addDays(s,n){ const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function mondayOf(s){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
function fmtDay(s, compact){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); if(compact) return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); return d.toLocaleDateString(loc(),{weekday:'short',day:'numeric',month:'short'}); }
function dm(s, compact){ if(!valid(s)) return s||''; const d=new Date(s+'T00:00:00'); if(compact) return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}); return d.toLocaleDateString(loc(),{day:'numeric',month:'short'}); }
function monthKey(s){ return (s||'').slice(0,7); }
function fmtMonth(k){ if(!valid(k+'-01')) return k||''; return new Date(k+'-01T00:00:00').toLocaleDateString(loc(),{month:'long',year:'numeric'}); }
function shareOf(g){ return g*(settings.share/100); }

function renderStats(){

  const prevMk=(()=>{ const d=new Date(td+'T00:00:00'); d.setDate(1); d.setDate(0); return d.toISOString().slice(0,7); })();

  const data=[

function anchorMonFor(arr){
  const todayMon=mondayOf(todayStr());
  if(!arr.length) return todayMon;
  const maxDate=arr.reduce((m,c)=>c.date>m?c.date:m, arr[0].date);
  const dataMon=mondayOf(maxDate);
  return dataMon>todayMon?dataMon:todayMon;
}
function anchorMon(){ return anchorMonFor(activeCars()); }
function weekNumber(mon, arr){
  arr = arr || activeCars();
  if(!arr.length || !valid(mon)) return null;
  const minDate=arr.reduce((m,c)=>c.date<m?c.date:m, arr[0].date);
  const first=mondayOf(minDate);
  const diff=Math.round((new Date(mon+'T00:00:00') - new Date(first+'T00:00:00'))/(7*86400000));
  return diff+1;
}
function weekHead(mon, arr, compact){
  const sun=addDays(mon,6);
  const wn=weekNumber(mon, arr);
  const wlabel=(wn&&wn>=1)?`<span class="wk-num">${t('weekWord')} ${wn}</span> · `:'';
  return `<div class="week-head">${wlabel}<span class="wk-range">${dm(mon,compact)} – ${dm(sun,compact)} ${mon.slice(0,4)}</span></div>`;
}
function weekColumn(mon, collapsed){
  const list=carsDriver.filter(c=>mondayOf(c.date)===mon).sort((a,b)=>a.date<b.date?-1:1);
  const g=list.reduce((a,x)=>a+x.price,0);
  const cur = (mon===mondayOf(selDate())) ? ' current' : '';
  const wmi=list.reduce((a,x)=>a+(x.miles||0),0);

  if(collapsed){
    const byDayC={}; list.forEach(c=>{ (byDayC[c.date]=byDayC[c.date]||[]).push(c); });
    const daysC=Object.keys(byDayC).sort();
    const bodyC = daysC.length
      ? daysC.map(d=>{
          const chips=byDayC[d].map(c=>`<span class="pchip"><span class="pc-txt">${moneyc(c.price)}</span><button onclick="delCar('${c.id}')" title="${t('del')}">✕</button></span>`).join('');
          return `<div class="day-row"><div class="day-label">${fmtDay(d)}</div><div class="day-prices">${chips}</div></div>`;
        }).join('')
      : `<div class="wk-empty">${t('noEntries')}</div>`;
    return `<div class="week-col${cur}">${weekHead(mon, carsDriver)}
      <div class="week-body">${bodyC}</div>
      <div class="week-foot">
        <div>Gross: <b>${money(g)}</b></div>
        <div class="fshare">${t('shareFoot')} ${money(shareOf(g))}</div>
        <div class="wk-cnt">${list.length} ${t('cars')}</div>
      </div>
    </div>`;
  }

  const byDay={}; list.forEach(c=>{ (byDay[c.date]=byDay[c.date]||[]).push(c); });
  const days=Object.keys(byDay).sort();
  const body = days.length
    ? days.map(d=>{
        const items=byDay[d];
        const dsum=items.reduce((a,x)=>a+x.price,0);
        const dmi=items.reduce((a,x)=>a+(x.miles||0),0);
        const chips=items.map(c=>{
          const meta=[routeStates(c.route), (c.miles? c.miles+' mi':'')].filter(Boolean).join(' · ');
          return `<span class="pchip"><span class="pc-txt">${moneyc(c.price)}${meta?' · '+esc(meta):''}</span><button onclick="delCar('${c.id}')" title="${t('del')}">✕</button></span>`;
        }).join('');
        const parts=[];
        if(items.length>1) parts.push('= '+money(dsum));
        if(dmi>0) parts.push('$/m '+dpmFmt(dsum/dmi));
        const sum = parts.length ? `<span class="day-sum">${parts.join(' · ')}</span>` : '';
        return `<div class="day-row"><div class="day-label">${fmtDay(d)}</div><div class="day-prices">${chips}${sum}</div></div>`;
      }).join('')
    : `<div class="wk-empty">${t('noEntries')}</div>`;
  return `<div class="week-col${cur}">${weekHead(mon, carsDriver)}
    <div class="week-body">${body}</div>
    <div class="week-foot">
      <div>Gross: <b>${money(g)}</b></div>
      <div class="fshare">${t('shareFoot')} ${money(shareOf(g))}</div>
      ${wmi>0?`<div class="wk-dpm">$/m: ${dpmFmt(g/wmi)} · ${wmi} mi</div>`:''}
      <div class="wk-cnt">${list.length} ${t('cars')}</div>
    </div>
  </div>`;
}
function renderWeekView(){
  const curMon=anchorMonFor(carsDriver);
  const newest=addDays(curMon,-7*weekPage);
  const older=addDays(newest,-7);
  const canNewer=weekPage>-8;
  return `<div class="week-nav">
      <button class="navbtn" onclick="navWeek(1)">${t('navPrev')}</button>
      <button class="navbtn" onclick="goToday()">${t('todayBtn')}</button>
      <button class="navbtn" onclick="navWeek(-1)" ${canNewer?'':'disabled'}>${t('navNext')}</button>
    </div>
    <div class="week-grid">${weekColumn(older, true)}${weekColumn(newest, false)}</div>`;
}

function renderContent(){

  if(carsDriver.length===0){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }

    return;
  }
  const groups={}; carsDriver.forEach(x=>{ const k=monthKey(x.date); (groups[k]=groups[k]||[]).push(x); });
  const keys=Object.keys(groups).sort().reverse();
  let html=`<table><thead><tr><th></th><th class="num">Gross</th><th class="num">${t('shareFoot').replace(':','')}</th></tr></thead><tbody>`;

    list.forEach(x=>{ html+=`<tr><td class="rowday" style="padding-left:22px">${fmtDay(x.date)}${x.route?' · '+esc(x.route):''}</td><td class="num">${money(x.price)}</td><td class="num"><button class="del" onclick="delCar('${x.id}')">${t('del')}</button></td></tr>`; });
  });
  html+=`</tbody></table>`; c.innerHTML=html;
}

// --- კვირებზე გადაფურცვლა (swipe) ---
(function(){
  const el=document.getElementById('content');
  let sx=0, sy=0, tracking=false;
  el.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; tracking=true; }, {passive:true});
  el.addEventListener('touchend', e=>{
    if(!tracking || view!=='week') return; tracking=false;
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0) navWeek(-1); else navWeek(1); // მარცხნივ → წინ (შემდეგი კვირა)
    }
  }, {passive:true});
})();
document.getElementById('date').addEventListener('change', ()=>{ if(appMode==='owner') loadMileageInputs(); render(); });

// --- სურათიდან წაკითხვა (OCR, ტელეფონშივე) ---
let tessLoading=null;
function ensureTesseract(){
  if(typeof Tesseract!=='undefined') return Promise.resolve();
  if(tessLoading) return tessLoading;
  tessLoading=new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
  return tessLoading;
}
function parseOCR(text){
  const m=text.match(/\$\s?\d[\d,]*(?:\.\d{1,2})?/g);
  if(m&&m.length){ let best=0; m.forEach(x=>{ const v=parseFloat(x.replace(/[^0-9.]/g,'')); if(v>best) best=v; }); if(best>0) document.getElementById('price').value=best; }
  const cs=text.match(/[A-Za-z][A-Za-z .'\-]{1,22},\s*[A-Z]{2}(?![A-Za-z])/g);
  if(cs&&cs.length>=2){ document.getElementById('route').value=cs[0].trim()+' → '+cs[cs.length-1].trim(); }
  else { const ft=text.match(/from\s+(.+?)\s+to\s+([^\n]+)/i); if(ft) document.getElementById('route').value=ft[1].trim()+' → '+ft[2].trim(); }
  const mi=text.match(/(\d[\d,]{0,5})\s*mi(?:les)?\b/i);
  if(mi){ const v=parseFloat(mi[1].replace(/,/g,'')); if(v>0) document.getElementById('miles').value=v; }
  document.getElementById('price').focus();
}
async function handleImage(file){
  if(!file) return;
  const btn=document.getElementById('imgBtn'); const orig=btn.textContent; btn.textContent='⏳'; btn.disabled=true;
  try{ await ensureTesseract(); const r=await Tesseract.recognize(file,'eng'); parseOCR(r.data.text||''); }
  catch(e){ console.warn('OCR', e); alert(t('ocrFail')); }
  btn.textContent=orig; btn.disabled=false;
}
document.getElementById('imgBtn').addEventListener('click', ()=>document.getElementById('imgInput').click());
document.getElementById('imgInput').addEventListener('change', e=>{ const f=e.target.files&&e.target.files[0]; handleImage(f); e.target.value=''; });

(function(){
  const kbBar=document.getElementById('kbBar');
  const priceEl=document.getElementById('price');
  function positionBar(){ const vv=window.visualViewport; if(!vv) return; const gap=Math.max(0, window.innerHeight-(vv.height+vv.offsetTop)); kbBar.style.transform='translateY(-'+gap+'px)'; }
  priceEl.addEventListener('focus', ()=>{ kbBar.classList.add('show'); setTimeout(positionBar,50); });
  priceEl.addEventListener('blur', ()=>{ setTimeout(()=>kbBar.classList.remove('show'),150); });
  if(window.visualViewport){ window.visualViewport.addEventListener('resize', positionBar); window.visualViewport.addEventListener('scroll', positionBar); }
  document.getElementById('kbAdd').addEventListener('pointerdown', e=>{ e.preventDefault(); addCar(); setTimeout(positionBar,50); });
})();

// --- owner-operator რეჟიმი ---
let selectedCat = EXP_CATS[0];
function populateCats(){
  const row=document.getElementById('expCatRow'); if(!row) return;
  row.innerHTML = EXP_CATS.map(c=>`<button type="button" class="cat-chip${c===selectedCat?' active':''}" onclick="pickCat('${c}')">${c}</button>`).join('');
}
function pickCat(c){ selectedCat=c; populateCats(); }
function changeExpDate(delta){ const el=document.getElementById('expDate'); el.value=addDays(el.value||todayStr(),delta); }

// --- კვირის ოდომეტრი (Starting/Ending/Weekly mileage) ---
function weeklyMiles(mon){
  const r=weeklyMileage[mon];
  if(!r || r.start==null || r.end==null) return 0;
  return Math.max(0, r.end-r.start);
}
function updateWeekMiDisplay(){
  const s=parseFloat(document.getElementById('ownStartMi').value); const e=parseFloat(document.getElementById('ownEndMi').value);
  const wm = (!isNaN(s)&&!isNaN(e)) ? Math.max(0, e-s) : 0;
  document.getElementById('weekMiDisplay').textContent = wm;
}
function loadMileageInputs(){
  const k=mondayOf(selDate()); const r=weeklyMileage[k]||{};
  document.getElementById('ownStartMi').value = (r.start!=null) ? r.start : '';
  document.getElementById('ownEndMi').value = (r.end!=null) ? r.end : '';
  updateWeekMiDisplay();
}
function saveMileageInputs(){
  const k=mondayOf(selDate());
  const sVal=document.getElementById('ownStartMi').value, eVal=document.getElementById('ownEndMi').value;
  const s=sVal===''?null:parseFloat(sVal), e=eVal===''?null:parseFloat(eVal);
  weeklyMileage[k] = { start:s, end:e };
  store.set('weeklyMileage', JSON.stringify(weeklyMileage)); pushCloud();
  updateWeekMiDisplay(); render();
}

function applyMode(){
  const owner = appMode==='owner';
  document.getElementById('modeDriver').classList.toggle('active', !owner);
  document.getElementById('modeOwner').classList.toggle('active', owner);
  document.getElementById('expCard').style.display = owner ? '' : 'none';
  document.getElementById('shareRow').style.display = owner ? 'none' : '';
  document.getElementById('routeRow').style.display = owner ? 'none' : '';
  document.getElementById('mileageRow').style.display = owner ? '' : 'none';
  if(owner) loadMileageInputs();
}
function setMode(m){ appMode=m; weekPage=0; store.set('mode', m); applyMode(); updateUndoRedo(); render(); }
function addExpense(){
  const el=document.getElementById('expAmt'); const amt=parseFloat(el.value);
  if(!amt||amt<=0){ el.focus(); return; }
  const cat=selectedCat||'Other';
  const date=document.getElementById('expDate').value||todayStr();
  expenses.push({ id:Date.now()+''+Math.random(), date, cat, amount:amt });
  el.value=''; saveExpenses(); render(); el.focus();
}
function delExpense(id){ expenses=expenses.filter(e=>e.id!==id); saveExpenses(); render(); }

function ownerRenderStats(){
  const td=todayStr(), wk=mondayOf(td), lastWk=addDays(wk,-7), mk=monthKey(td), yr=td.slice(0,4), prevYr=(parseInt(yr)-1)+'';
  const prevMk=(()=>{ const d=new Date(td+'T00:00:00'); d.setDate(1); d.setDate(0); return d.toISOString().slice(0,7); })();
  const gsum=fn=>carsOwner.filter(fn).reduce((a,c)=>a+c.price,0);
  const esum=fn=>expenses.filter(fn).reduce((a,x)=>a+x.amount,0);
  const card=(l,fn)=>{ const g=gsum(fn), e=esum(fn); return {l,g,e,n:g-e}; };
  const data=[
    card(t('thisWeek'), c=>mondayOf(c.date)===wk),
    card(t('lastWeek'), c=>mondayOf(c.date)===lastWk),
    card(t('thisMonth'), c=>monthKey(c.date)===mk),
    card(t('lastMonth'), c=>monthKey(c.date)===prevMk),
    card((yr+' '+t('yearWord')).trim(), c=>c.date.slice(0,4)===yr),
    card((prevYr+' '+t('yearWord')).trim(), c=>c.date.slice(0,4)===prevYr),
    card(t('total'), ()=>true)
  ];
  document.getElementById('stats').innerHTML=data.map(o=>`
    <div class="stat"><div class="lbl">${o.l}</div>
      <div class="share-main">${money(o.n)}</div>
      <div class="gross-sub">Gross: ${money(o.g)}</div>
      <div class="cnt">${t('totalExp')}: ${money(o.e)}</div>
    </div>`).join('');
}
function ownerWeekColumn(mon, collapsed){
  const loads=carsOwner.filter(c=>mondayOf(c.date)===mon).sort((a,b)=>a.date<b.date?-1:1);
  const exps=expenses.filter(e=>mondayOf(e.date)===mon).sort((a,b)=>a.date<b.date?-1:1);
  const g=loads.reduce((a,x)=>a+x.price,0);
  const wmi=weeklyMiles(mon);
  const eTotal=exps.reduce((a,x)=>a+x.amount,0);
  const net=g-eTotal;
  const cur=(mon===mondayOf(selDate()))?' current':'';
  let body;
  if(collapsed){
    body = `<div class="wk-empty">${money(g)} − ${money(eTotal)}</div>`;
  } else {
    const loadsHtml = loads.length
      ? loads.map(c=>{
          const meta=[routeStates(c.route), (c.miles? c.miles+' mi':'')].filter(Boolean).join(' · ');
          return `<div class="exp-item"><span>${fmtDay(c.date,true)}${meta?' · '+esc(meta):''}</span><span class="exp-amt" style="color:var(--accent)">${moneyc(c.price)}</span><button class="del" onclick="delCar('${c.id}')">✕</button></div>`;
        }).join('')
      : `<div class="wk-empty">${t('noEntries')}</div>`;
    const expHtml = exps.length
      ? exps.map(e=>`<div class="exp-item"><span>${fmtDay(e.date,true)} · ${esc(e.cat)}</span><span class="exp-amt">−${money(e.amount)}</span><button class="del" onclick="delExpense('${e.id}')">✕</button></div>`).join('')
      : `<div class="wk-empty">${t('noEntries')}</div>`;
    body = `<div class="owner-split">
      <div class="owner-col"><div class="owner-col-head">${t('priceCol')}</div>${loadsHtml}</div>
      <div class="owner-col"><div class="owner-col-head">${t('totalExp')}</div>${expHtml}</div>
    </div>`;
  }
  const byCat={}; exps.forEach(e=>{ byCat[e.cat]=(byCat[e.cat]||0)+e.amount; });
  const catKeys=Object.keys(byCat);
  const catBreak = catKeys.length ? `<div class="wk-catbreak">${catKeys.map(k=>k+' −'+moneyc(byCat[k])).join(' · ')}</div>` : '';
  return `<div class="week-col${cur}">${weekHead(mon, carsOwner, true)}
    <div class="week-body">${body}</div>
    <div class="week-foot">
      <div>Gross: <b>${money(g)}</b>${wmi>0?` · $/m ${dpmFmt(g/wmi)}`:''}</div>
      <div>${t('totalExp')}: <b>−${money(eTotal)}</b></div>
      ${catBreak}
      <div class="fshare">${t('payLbl')}: ${money(net)}</div>
      ${wmi>0?`<div class="wk-dpm">${t('weekMiLbl')}: ${wmi} mi</div>`:''}
      <div class="wk-cnt">${loads.length} ${t('cars')} · ${exps.length} ${t('expTitle')}</div>
    </div>
  </div>`;
}
function ownerRenderContent(){
  const c=document.getElementById('content');
  if(view==='week'){
    const curMon=anchorMonFor(carsOwner);
    const newest=addDays(curMon,-7*weekPage);
    const older=addDays(newest,-7);
    const canNewer=weekPage>-8;
    c.innerHTML=`<div class="week-nav">
        <button class="navbtn" onclick="navWeek(1)">${t('navPrev')}</button>
        <button class="navbtn" onclick="goToday()">${t('todayBtn')}</button>
        <button class="navbtn" onclick="navWeek(-1)" ${canNewer?'':'disabled'}>${t('navNext')}</button>
      </div>
      <div class="week-grid">${ownerWeekColumn(older, true)}${ownerWeekColumn(newest, false)}</div>`;
    return;
  }
  if(view==='month'){
    const months={};
    carsOwner.forEach(x=>{ const k=monthKey(x.date); (months[k]=months[k]||{g:0,e:0}).g+=x.price; });
    expenses.forEach(x=>{ const k=monthKey(x.date); (months[k]=months[k]||{g:0,e:0}).e+=x.amount; });
    const keys=Object.keys(months).sort().reverse();
    if(!keys.length){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }
    c.innerHTML=`<table><thead><tr><th></th><th class="num">Gross</th><th class="num">${t('totalExp')}</th><th class="num">${t('net')}</th></tr></thead><tbody>${
      keys.map(k=>{ const m=months[k]; return `<tr class="grp"><td>${fmtMonth(k)}</td><td class="num">${money(m.g)}</td><td class="num">−${money(m.e)}</td><td class="num share-col">${money(m.g-m.e)}</td></tr>`; }).join('')}</tbody></table>`;
    return;
  }
  // all -> expense list
  if(!expenses.length){ c.innerHTML='<div class="empty">'+t('noneYet')+'</div>'; return; }
  const all=[...expenses].sort((a,b)=>a.date<b.date?1:-1);
  c.innerHTML=`<table><thead><tr><th>${t('day')}</th><th>${t('expCat')}</th><th class="num">${t('expAmt')}</th><th></th></tr></thead><tbody>${
    all.map(x=>`<tr><td class="rowday">${fmtDay(x.date)}</td><td class="rowday">${esc(x.cat)}</td><td class="num">−${money(x.amount)}</td><td class="num"><button class="del" onclick="delExpense('${x.id}')">${t('del')}</button></td></tr>`).join('')}</tbody></table>`;
}

document.getElementById('expAdd').addEventListener('click', addExpense);
document.getElementById('expAmt').addEventListener('keydown', e=>{ if(e.key==='Enter') addExpense(); });
document.getElementById('ownStartMi').addEventListener('input', updateWeekMiDisplay);
document.getElementById('ownEndMi').addEventListener('input', updateWeekMiDisplay);
document.getElementById('ownStartMi').addEventListener('change', saveMileageInputs);
document.getElementById('ownEndMi').addEventListener('change', saveMileageInputs);

load();
</script>
